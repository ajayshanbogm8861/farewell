<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raksha ❤️ Ajay Journey</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff4d6d, #ff99ac);
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .active {
            display: flex;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }

        .pink {
            background: #ff4d6d;
            color: white;
        }

        .white {
            background: white;
            color: #ff4d6d;
        }

        img {
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            margin: 10px;
        }

        .msg {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            animation: fadeIn 1s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <audio id="music" loop>
        <source src="music.mp3">
    </audio>

    <!-- INTRO -->
    <div class="screen active" id="intro">
        <h1>✨ Raksha’s Journey ✨</h1>
        <p>2.5 years of memories… ❤️</p>
        <button class="pink" onclick="next('chat')">Start Journey</button>
    </div>

    <!-- CHAT -->
    <div class="screen" id="chat">

        <h2>💬 Our Journey</h2>

        <div id="chatBox"></div>

        <button id="continueBtn" class="pink" style="display:none;" onclick="next('slideScreen')">
            Continue Journey ❤️
        </button>

    </div>

    <!-- SLIDESHOW -->
    <div class="screen" id="slideScreen">
        <h2>📸 Memories</h2>
        <img id="slide" src="photo1.jpg">
    </div>

    <!-- GAME -->
    <div class="screen" id="game">
        <h2>Will you remember Ajay? 😜</h2>
        <button id="yes" class="pink">YES ❤️</button>
        <button id="no" class="white">NO 🙈</button>
    </div>

    <!-- FINAL -->
    <div class="screen" id="final">
        <h1>❤️ Dear Raksha ❤️</h1>

        <p id="finalText" style="max-width:700px;line-height:1.6;"></p>

    </div>

    <script>

        let screens = document.querySelectorAll(".screen");

        /* NAVIGATION */
        function next(id) {

            screens.forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");

            if (id == "chat") startChat();
            if (id == "slideScreen") startSlide();
            if (id == "game") startGame();
            if (id == "final") typeText();
        }

        /* MUSIC AUTO START */
        window.addEventListener("click", () => document.getElementById("music").play(), { once: true });

        /* ================= CHAT ================= */
        function startChat() {

            let box = document.getElementById("chatBox");
            box.innerHTML = "";
            document.getElementById("continueBtn").style.display = "none";

            let msgs = [
                "❤️ 2.5 years ago our journey started…",
                "✨ From strangers → Friends → Best Friends → memories…",
                "😊 Every small talk became special…",
                "💫 Every moment added meaning to life…",
                "🌸 You became an important part of this journey…",
                "❤️ Not just memories, but emotions were created…",
                "🙏 Thank you for everything, Raksha…",
                "💖 No matter where life goes, memories remain forever…",
                "— Ajay ❤️"
            ];

            let i = 0;

            let t = setInterval(() => {

                if (i < msgs.length) {
                    let d = document.createElement("div");
                    d.className = "msg";
                    d.innerText = msgs[i];
                    box.appendChild(d);
                    i++;
                }
                else {
                    clearInterval(t);
                    document.getElementById("continueBtn").style.display = "inline-block";
                }

            }, 1100);
        }

        /* ================= SLIDESHOW ================= */
        let photos = [
            "photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg", "photo6.jpg",
            "photo7.jpg", "photo8.jpg", "photo9.jpg", "photo10.jpg", "photo11.jpg", "photo12.jpg", "photo13.jpg"
        ];

        let i = 0;
        let slideInterval;
        let started = false;

        function startSlide() {

            if (started) return;
            started = true;

            i = 0;

            slideInterval = setInterval(() => {

                document.getElementById("slide").src = photos[i];
                i++;

                if (i >= photos.length) {
                    clearInterval(slideInterval);
                    setTimeout(() => next("game"), 1200);
                }

            }, 1800);
        }

        /* ================= GAME (FIXED MOBILE + DESKTOP) ================= */
        let gameStarted = false;

        function startGame() {

            if (gameStarted) return;
            gameStarted = true;

            let noBtn = document.getElementById("no");
            let yesBtn = document.getElementById("yes");

            function moveNo() {
                noBtn.style.position = "absolute";
                noBtn.style.top = Math.random() * 70 + 20 + "vh";
                noBtn.style.left = Math.random() * 70 + 10 + "vw";
            }

            /* Desktop hover */
            noBtn.addEventListener("mouseenter", moveNo);

            /* Mobile touch FIX */
            noBtn.addEventListener("touchstart", function (e) {
                e.preventDefault();
                moveNo();
            });

            /* Backup click protection */
            noBtn.addEventListener("click", moveNo);

            yesBtn.onclick = () => {
                next("final");
            };
        }

        /* ================= FINAL TYPE MESSAGE ================= */
        function typeText() {

            let text =
                "Some people come into our lives and become a part of our heart. 2.5 years of journey with you will always remain special. Wishing you happiness, success and peace in your new journey. — Ajay ❤️\n\n" +

                "Raksha… please don’t forget me. If not daily, at least call me once a week — a simple video call would mean a lot 😊.\n\n" +

                "I don’t want anything big… just don’t disappear completely from my life.\n\n" +

                "Thank you for all my dear sweety ❤️.\n\n" +

                "If I ever did anything wrong in your life, I am really sorry for that. I never meant to hurt you.\n\n" +

                "And lastly… I just want to say it from my heart…\n\n" +

                "Also, I'm sorry for not giving you any gift for your send-off. 🎁❤️\n\n" +

                "Just wait for your birthday on 6th September... I have something special planned for you. 😊🎂💖\n\n" +

                "I love youuuuu ❤️❤️❤️";

            let el = document.getElementById("finalText");
            el.innerHTML = "";

            let i = 0;

            let t = setInterval(() => {
                if (i < text.length) {
                    el.innerHTML += text[i];
                    i++;
                } else clearInterval(t);
            }, 35);
        }

    </script>

</body>

</html>
